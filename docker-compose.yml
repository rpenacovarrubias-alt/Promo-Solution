version: '3.8'

services:

  # ── Panel de administración (React/Vite + Express API) ──────────────────────
  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL}
      PUBLIC_API_KEY: ${PUBLIC_API_KEY}
    restart: unless-stopped
    networks:
      - promosolution

  # ── Sitio público (Next.js) ──────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://promosolution.com.mx}
      NEXT_PUBLIC_CDN_URL: ${NEXT_PUBLIC_CDN_URL}
      NEXT_PUBLIC_ADMIN_API: ${NEXT_PUBLIC_ADMIN_API:-https://admin.promosolution.com.mx}
      # Para SSR: comunicación interna entre contenedores Docker (sin pasar por internet)
      ADMIN_API_URL: http://admin:4000
      # Clave para que el proxy Next.js llame a la API pública (no expuesta al cliente)
      PUBLIC_API_KEY: ${PUBLIC_API_KEY}
    restart: unless-stopped
    networks:
      - promosolution

  # Solo para desarrollo local — en producción usa el PostgreSQL existente del servidor
  postgres:
    image: postgres:16-alpine
    profiles: ["local"]  # Solo activo con: docker compose --profile local up
    environment:
      POSTGRES_DB: promosolution
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localdev
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    networks:
      - promosolution

volumes:
  pgdata:

networks:
  promosolution:
    external: true  # Se conecta a la red Docker existente del servidor
