# =============================================================
# Nginx — Promo Solution
# Archivo a colocar en EasyPanel como proxy personalizado, o
# directamente en /etc/nginx/sites-enabled/ del VPS.
#
# Dominios:
#   promosolution.com.mx        → Next.js  (puerto 3000)
#   admin.promosolution.com.mx  → Express  (puerto 4000)
# =============================================================

# ── Sitio público (Next.js) ───────────────────────────────────────────────────
server {
    listen 80;
    server_name promosolution.com.mx www.promosolution.com.mx;

    # Redirigir HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name promosolution.com.mx www.promosolution.com.mx;

    # SSL — EasyPanel gestiona los certificados Let's Encrypt automáticamente.
    # Si configuras manualmente, ajusta estas rutas:
    # ssl_certificate     /etc/letsencrypt/live/promosolution.com.mx/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/promosolution.com.mx/privkey.pem;

    client_max_body_size 10M;

    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ── Panel de administración (Express + React/Vite) ────────────────────────────
server {
    listen 80;
    server_name admin.promosolution.com.mx;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name admin.promosolution.com.mx;

    client_max_body_size 10M;

    location / {
        proxy_pass         http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
